<!DOCTYPE html>
<html>
<head>
    <title>April Fool</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-size: 40px;
            margin-top: 20%;
            font-family: Arial;
            transition: 0.5s;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

    <h1 id="text">Click Me 😏</h1>
    <button onclick="prank()">Click Here</button>

    <script>
        function prank() {
            document.body.style.backgroundColor = "red";
            document.body.style.color = "black";
            document.getElementById("text").innerHTML = "😂 April Fool 😂";
        }
    </script>

</body>
</html>
